# =============================================================
# VEKTOR A.I — PRODUCTION (VPS vps8817 deploy)
# Reuses existing infra on the VPS (icontainer-network):
#   - PostgreSQL : ic-postgresql-aIFq:5432
#   - Redis      : ic-redis-zf84:6379
#   - Evolution  : http://ic-evolutionapi-8nZx:8080
#
# Exposes ONLY on loopback (proxied publicly by OpenResty):
#   - Frontend : 127.0.0.1:3011
#   - Backend  : 127.0.0.1:3012  (under /api)
#
# Usage:
#   cd /opt/vektor-ai
#   cp .env.production.example .env
#   docker compose -f docker-compose.prod.yml up -d --build
# =============================================================

services:
  vektor-frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: vektor/frontend:prod
    container_name: vektor-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3011
      VITE_API_BASE_URL: /api
    ports:
      - "127.0.0.1:3011:3011"
    depends_on:
      - vektor-backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - icontainer-network

  vektor-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: vektor/backend:prod
    container_name: vektor-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3012
    ports:
      - "127.0.0.1:3012:3012"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3012/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - icontainer-network

networks:
  # Existing external network on the VPS containing
  # ic-postgresql-aIFq, ic-redis-zf84, ic-evolutionapi-8nZx.
  # Create once if missing:  docker network create icontainer-network
  icontainer-network:
    external: true
