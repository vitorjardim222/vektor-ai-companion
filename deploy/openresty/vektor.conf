# =============================================================
# VEKTOR A.I — OpenResty reverse proxy (VPS vps8817)
# Install path on the VPS:
#   /etc/icontainer/apps/openresty/openresty/conf/conf.d/vektor.conf
# Reload:
#   openresty -t && openresty -s reload
#
# HTTP only for first boot. SSL can be added later via certbot.
# =============================================================

server {
    listen 80;
    listen [::]:80;
    server_name vektor.vps8817.panel.icontainer.net;

    client_max_body_size 25m;

    # Hardening
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Backend API (Fastify on 127.0.0.1:3012) ----
    location /api/ {
        proxy_pass         http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Evolution webhooks, realtime)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- Frontend (TanStack Start on 127.0.0.1:3011) ----
    location / {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

# --- After DNS points to the VPS, enable HTTPS with certbot ---
# certbot --nginx -d vektor.vps8817.panel.icontainer.net
