# =============================================================
# VEKTOR A.I — OpenResty / Nginx reverse proxy
# Drop this file in /etc/openresty/conf.d/ (or sites-enabled/)
# Replace vektor.yourdomain.com with your real domain.
# SSL is handled by certbot (Let's Encrypt) — paths shown below.
# =============================================================

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name vektor.yourdomain.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS public entrypoint ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vektor.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/vektor.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vektor.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    # Hardening
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Backend API (Fastify on 127.0.0.1:3012) ----
    location /api/ {
        proxy_pass         http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Evolution webhooks, realtime)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- Frontend (TanStack Start on 127.0.0.1:3011) ----
    location / {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
